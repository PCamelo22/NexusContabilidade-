<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ElaConta — Login</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --purple: #6B21A8;
      --purple-l: #7C3AED;
      --pink: #EC1E8C;
      --bg: #F5F3FF;
      --white: #FFFFFF;
      --border: #EDE9FE;
      --text: #1E1B4B;
      --muted: #6B7280;
      --danger: #EF4444;
      --font: 'Plus Jakarta Sans', sans-serif;
    }

    body {
      font-family: var(--font);
      background: var(--bg);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .wrap { width: 100%; max-width: 400px; }

    /* Logo */
    .logo-area {
      text-align: center;
      margin-bottom: 28px;
    }
    .logo-icon {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 56px; height: 56px;
      border-radius: 16px;
      background: linear-gradient(135deg, #6B21A8, #EC1E8C);
      margin-bottom: 10px;
    }
    .logo-icon svg { width: 28px; height: 28px; }
    .logo-name {
      font-size: 24px;
      font-weight: 700;
      background: linear-gradient(135deg, #6B21A8, #EC1E8C);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .logo-sub {
      font-size: 13px;
      color: var(--muted);
      margin-top: 4px;
    }

    /* Card teste */
    .card-teste {
      background: var(--white);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 16px;
    }
    .card-teste-title {
      font-size: 11px;
      font-weight: 600;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 12px;
    }
    .teste-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }
    .teste-btn {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 12px;
      text-align: left;
      cursor: pointer;
      transition: border-color 0.15s;
    }
    .teste-btn:hover { border-color: var(--purple); }
    .teste-label {
      font-size: 12px;
      font-weight: 600;
      color: var(--purple);
      margin-bottom: 4px;
    }
    .teste-info {
      font-size: 11px;
      color: var(--muted);
      line-height: 1.6;
    }
    .teste-link {
      font-size: 11px;
      color: var(--purple);
      margin-top: 4px;
    }

    /* Card login */
    .card-login {
      background: var(--white);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 28px;
    }
    .card-title {
      font-size: 13px;
      color: var(--muted);
      text-align: center;
      margin-bottom: 16px;
    }

    /* Tabs */
    .tabs {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-bottom: 24px;
    }
    .tab {
      padding: 12px 8px;
      border-radius: 10px;
      border: 1px solid var(--border);
      background: var(--white);
      color: var(--muted);
      font-size: 13px;
      font-weight: 400;
      font-family: var(--font);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      cursor: pointer;
      transition: all 0.15s;
    }
    .tab.active {
      border: 2px solid var(--purple);
      background: var(--bg);
      color: var(--purple);
      font-weight: 600;
    }
    .tab-icon { font-size: 20px; }

    /* Form */
    .field { margin-bottom: 14px; }
    .field label {
      display: block;
      font-size: 12px;
      color: var(--muted);
      margin-bottom: 6px;
    }
    .field input {
      width: 100%;
      padding: 10px 12px;
      border-radius: 8px;
      border: 1px solid var(--border);
      font-size: 14px;
      font-family: var(--font);
      color: var(--text);
      background: var(--bg);
      outline: none;
      transition: border-color 0.15s;
    }
    .field input:focus { border-color: var(--purple); }

    .btn-login {
      width: 100%;
      padding: 12px;
      border-radius: 10px;
      border: none;
      background: linear-gradient(135deg, #6B21A8, #EC1E8C);
      color: #fff;
      font-size: 14px;
      font-weight: 600;
      font-family: var(--font);
      cursor: pointer;
      margin-top: 6px;
      transition: opacity 0.15s;
    }
    .btn-login:hover { opacity: 0.9; }
    .btn-login:disabled { opacity: 0.6; cursor: not-allowed; }

    .erro {
      background: #FEF2F2;
      border: 1px solid #FECACA;
      color: var(--danger);
      font-size: 13px;
      padding: 10px 12px;
      border-radius: 8px;
      margin-top: 12px;
      display: none;
    }

    .footer-links {
      text-align: center;
      margin-top: 16px;
      font-size: 13px;
      color: var(--muted);
    }
    .footer-links a { color: var(--purple); font-weight: 600; text-decoration: none; }

    .suporte {
      text-align: center;
      margin-top: 12px;
      font-size: 12px;
      color: var(--muted);
    }
    .suporte a { color: var(--pink); font-weight: 500; text-decoration: none; }
  </style>
</head>
<body>
  <div class="wrap">

    <!-- Logo -->
    <div class="logo-area">
      <div class="logo-icon">
        <svg viewBox="0 0 28 28" fill="none">
          <path d="M14 4L4 22h20L14 4z" fill="white" opacity="0.9"/>
          <circle cx="14" cy="20" r="2.5" fill="white" opacity="0.6"/>
        </svg>
      </div>
      <div class="logo-name">ElaConta</div>
      <div class="logo-sub">Contabilidade inteligente</div>
    </div>

    <!-- Credenciais de teste -->
    <div class="card-teste">
      <div class="card-teste-title">Credenciais de teste</div>
      <div class="teste-grid">
        <button class="teste-btn" onclick="preencher('contadora@elaconta.com.br','123456','contador')">
          <div class="teste-label">Contadora</div>
          <div class="teste-info">contadora@elaconta.com.br<br>senha: 123456</div>
          <div class="teste-link">Clique para preencher →</div>
        </button>
        <button class="teste-btn" onclick="preencher('cliente@mercadosilva.com.br','123456','cliente')">
          <div class="teste-label">Cliente</div>
          <div class="teste-info">cliente@mercadosilva.com.br<br>senha: 123456</div>
          <div class="teste-link">Clique para preencher →</div>
        </button>
      </div>
    </div>

    <!-- Card de login -->
    <div class="card-login">
      <div class="card-title">Como você vai entrar?</div>

      <div class="tabs">
        <button class="tab active" id="tab-cliente" onclick="setTipo('cliente')">
          <span class="tab-icon">👤</span>
          Sou cliente
        </button>
        <button class="tab" id="tab-contador" onclick="setTipo('contador')">
          <span class="tab-icon">💻</span>
          Sou contadora
        </button>
      </div>

      <div class="field">
        <label>E-mail</label>
        <input type="email" id="email" placeholder="seu@email.com" />
      </div>
      <div class="field">
        <label>Senha</label>
        <input type="password" id="senha" placeholder="••••••••" onkeydown="if(event.key==='Enter') entrar()" />
      </div>

      <button class="btn-login" id="btn-entrar" onclick="entrar()">Entrar</button>

      <div class="erro" id="erro">E-mail ou senha incorretos.</div>

      <div class="footer-links">
        Ainda não tem conta? <a href="/cadastro">Cadastre-se</a>
      </div>
      <div class="footer-links" style="margin-top:8px">
        <a href="/recuperar-senha" style="color:var(--muted);font-weight:400">Esqueci minha senha</a>
      </div>
     <div class="suporte">
  Suporte técnico: <a href="https://wa.me/5561982955839" style="color:var(--pink);font-weight:500">WhatsApp</a>
</div>

<div style="text-align:center;margin-top:12px">
  <a href="/conhecer" style="
    display:inline-block;
    padding:10px 20px;
    border-radius:10px;
    background:linear-gradient(135deg,#6B21A8,#EC1E8C);
    color:#fff;font-size:13px;font-weight:600;
    text-decoration:none;width:100%;box-sizing:border-box">
    ✨ Conheça nosso trabalho
  </a>
</div>
    </div>

  </div>

  <script>
    let tipoAtivo = 'cliente'

    function setTipo(tipo) {
      tipoAtivo = tipo
      document.getElementById('tab-cliente').className  = 'tab' + (tipo === 'cliente'  ? ' active' : '')
      document.getElementById('tab-contador').className = 'tab' + (tipo === 'contador' ? ' active' : '')
    }

    function preencher(email, senha, tipo) {
      document.getElementById('email').value = email
      document.getElementById('senha').value = senha
      setTipo(tipo)
    }

    async function entrar() {
      const email = document.getElementById('email').value.trim()
      const senha = document.getElementById('senha').value
      const btn   = document.getElementById('btn-entrar')
      const erro  = document.getElementById('erro')

      if (!email || !senha) return

      btn.disabled    = true
      btn.textContent = 'Entrando...'
      erro.style.display = 'none'

      try {
        const res = await fetch('/auth/login', {
          method:  'POST',
          headers: { 'Content-Type': 'application/json' },
          body:    JSON.stringify({ email, senha }),
        })

        if (!res.ok) throw new Error()

        const data = await res.json()
        localStorage.setItem('token',   data.access_token)
        localStorage.setItem('usuario', JSON.stringify(data.usuario))

        window.location.href = data.usuario.tipo === 'contador' ? '/contador' : '/cliente'

      } catch {
        erro.style.display  = 'block'
        btn.disabled        = false
        btn.textContent     = 'Entrar'
      }
    }
  </script>
</body>
</html>
